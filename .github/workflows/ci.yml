name: CI
on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref (free; keeps the Actions list tidy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest          # free + unlimited on a public repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
      - name: Bundle datasets (pinned f1db + telemetry)
        run: |
          ./scripts/fetch_f1db.sh
          ./scripts/fetch_telemetry.sh
      - name: Unit tests + debug APK
        run: ./gradlew :composeApp:desktopTest :composeApp:testDebugUnitTest :composeApp:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: pitwall-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  macos-dmg:
    runs-on: macos-latest           # FREE on PUBLIC repos; jpackage can't cross-compile the .dmg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # AGP configures the android target even for a desktop task, so the SDK must be present.
      - uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
      - name: Bundle datasets (pinned f1db + telemetry)
        run: |
          ./scripts/fetch_f1db.sh
          ./scripts/fetch_telemetry.sh
      - name: Package .dmg
        run: ./gradlew :composeApp:packageDmg
      - uses: actions/upload-artifact@v4
        with:
          name: pitwall-macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
